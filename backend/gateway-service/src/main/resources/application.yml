server:
  port: 9090

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8724
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # 用户服务 - 认证接口（无需鉴权）
        - id: user-auth
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        # 用户服务 - 用户管理
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**,/api/login-logs/**
          filters:
            - StripPrefix=0

        # 角色权限服务
        - id: role-service
          uri: lb://role-service
          predicates:
            - Path=/api/roles/**,/api/permissions/**
          filters:
            - StripPrefix=0

        # 订单服务
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**,/api/reports/orders/**
          filters:
            - StripPrefix=0

        # 库存服务
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/products/**,/api/stock/**,/api/inventory-ledger/**,/api/extra/**,/api/reports/stock/**
          filters:
            - StripPrefix=0

        # 基础信息服务
        - id: base-service
          uri: lb://base-service
          predicates:
            - Path=/api/base/**,/api/reports/finance/**
          filters:
            - StripPrefix=0


services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: ims-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs:/docker-entrypoint-initdb.d
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.2.3
    platform: linux/amd64
    container_name: ims-nacos
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "127.0.0.1:${NACOS_PORT:-18848}:8848"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ims-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  seata:
    image: seataio/seata-server:2.0.0
    container_name: ims-seata
    environment:
      SEATA_PORT: 8091
      STORE_MODE: file
    networks:
      - ims-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': > /dev/tcp/localhost/8091'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== 业务微服务 ====================

  user-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/user-service
        SERVICE_PORT: 8081
    container_name: ims-user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      NACOS_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      seata:
        condition: service_healthy
    networks:
      - ims-network

  role-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/role-service
        SERVICE_PORT: 8082
    container_name: ims-role-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/role_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      NACOS_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      seata:
        condition: service_healthy
    networks:
      - ims-network

  order-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/order-service
        SERVICE_PORT: 8083
    container_name: ims-order-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      NACOS_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
      SEATA_TX_SERVICE_GROUP: default_tx_group
      SEATA_SERVICE_VGROUP_MAPPING_DEFAULT_TX_GROUP: default
      SEATA_SERVICE_GROUPLIST_DEFAULT: seata:8091
      SEATA_REGISTRY_TYPE: file
      SEATA_CONFIG_TYPE: file
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      seata:
        condition: service_healthy
    networks:
      - ims-network

  inventory-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/inventory-service
        SERVICE_PORT: 8084
    container_name: ims-inventory-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventory_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      NACOS_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
      SEATA_TX_SERVICE_GROUP: default_tx_group
      SEATA_SERVICE_VGROUP_MAPPING_DEFAULT_TX_GROUP: default
      SEATA_SERVICE_GROUPLIST_DEFAULT: seata:8091
      SEATA_REGISTRY_TYPE: file
      SEATA_CONFIG_TYPE: file
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - ims-network

  base-service:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/base-service
        SERVICE_PORT: 8085
    container_name: ims-base-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/base_service_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      NACOS_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_ENABLED: "false"
      SEATA_TX_SERVICE_GROUP: default_tx_group
      SEATA_SERVICE_VGROUP_MAPPING_DEFAULT_TX_GROUP: default
      SEATA_SERVICE_GROUPLIST_DEFAULT: seata:8091
      SEATA_REGISTRY_TYPE: file
      SEATA_CONFIG_TYPE: file
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    networks:
      - ims-network

  # ==================== API 网关 ====================

  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        SERVICE_PATH: backend/gateway-service
        SERVICE_PORT: 9090
    container_name: ims-gateway
    restart: on-failure
    environment:
      NACOS_ADDR: nacos:8848
    depends_on:
      nacos:
        condition: service_healthy
      user-service:
        condition: service_started
      role-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      base-service:
        condition: service_started
    networks:
      - ims-network

  # ==================== 前端 ====================

  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-18080}:80"
    depends_on:
      - gateway
    networks:
      - ims-network

volumes:
  mysql-data:

networks:
  ims-network:
    driver: bridge
